<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mango Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fff8e1 0%, #ffe082 100%);
      font-family: system-ui, -apple-system, sans-serif;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 1.5rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .emoji { font-size: 3.5rem; line-height: 1; margin-bottom: 0.5rem; }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 2rem;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    input[type="number"] {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 2px solid #ffe082;
      border-radius: 0.75rem;
      font-size: 1.1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus { border-color: #ffa000; }

    select {
      padding: 0.75rem 0.5rem;
      border: 2px solid #ffe082;
      border-radius: 0.75rem;
      font-size: 1rem;
      background: #fff;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    select:focus { border-color: #ffa000; }

    button {
      width: 100%;
      padding: 0.85rem;
      background: #ffa000;
      color: #fff;
      border: none;
      border-radius: 0.75rem;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 1.5rem;
    }

    button:hover { background: #e65100; }
    button:active { transform: scale(0.98); }
    button:disabled { background: #ccc; cursor: not-allowed; }

    .result {
      background: #fff8e1;
      border-radius: 1rem;
      padding: 1.25rem 1rem;
      display: none;
    }

    .result.visible { display: block; }

    .result-kg {
      font-size: 2rem;
      font-weight: 700;
      color: #e65100;
    }

    .result-mangoes {
      font-size: 1.1rem;
      color: #555;
      margin-top: 0.25rem;
    }

    .result-detail {
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 0.75rem;
    }

    .price-info {
      font-size: 0.78rem;
      color: #bbb;
      margin-top: 1.5rem;
    }

    .error {
      color: #c62828;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      display: none;
    }

    .error.visible { display: block; }

    .spinner {
      display: inline-block;
      width: 1em;
      height: 1em;
      border: 2px solid #fff6;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🥭</div>
    <h1>Mango Calculator</h1>
    <p class="subtitle">How many mangoes can you buy?</p>

    <div class="input-row">
      <input type="number" id="amount" placeholder="100" min="0" step="any" />
      <select id="currency">
        <option value="GBP">GBP £</option>
        <option value="USD">USD $</option>
        <option value="EUR">EUR €</option>
        <option value="CHF">CHF ₣</option>
        <option value="AUD">AUD $</option>
        <option value="CAD">CAD $</option>
        <option value="JPY">JPY ¥</option>
        <option value="INR">INR ₹</option>
      </select>
    </div>

    <button id="convertBtn" onclick="convert()">Calculate 🥭</button>

    <div class="error" id="error"></div>

    <div class="result" id="result">
      <div class="result-kg" id="resultKg"></div>
      <div class="result-mangoes" id="resultMangoes"></div>
      <div class="result-detail" id="resultDetail"></div>
    </div>

    <div class="price-info" id="priceInfo"></div>
  </div>

  <script>
    const MANGO_API = 'https://api.data.gov.in/resource/9ef84268-d588-465a-a308-a864a43d0070?api-key=579b464db66ec23bdd000001cdd3946e44ce4aab108d4753e6d8f3b6&format=json&filters[commodity]=Mango&limit=100';
    const ER_API = currency => `https://open.er-api.com/v6/latest/${currency}`;
    const FALLBACK_PRICE = 100; // ₹/kg

    let mangoPrice = null; // ₹/kg, loaded once

    async function fetchMangoPrice() {
      try {
        const res = await fetch(MANGO_API);
        const data = await res.json();
        const records = data?.records ?? [];
        if (!records.length) return FALLBACK_PRICE;
        // modal_price is in ₹/quintal → divide by 100 to get ₹/kg
        const prices = records
          .map(r => parseFloat(r.modal_price))
          .filter(p => p > 0);
        if (!prices.length) return FALLBACK_PRICE;
        const avg = prices.reduce((a, b) => a + b, 0) / prices.length;
        return avg / 100;
      } catch {
        return FALLBACK_PRICE;
      }
    }

    async function fetchRate(currency) {
      if (currency === 'INR') return 1;
      const res = await fetch(ER_API(currency));
      if (!res.ok) throw new Error('Exchange rate unavailable');
      const data = await res.json();
      const rate = data?.rates?.INR;
      if (!rate) throw new Error('INR rate not found');
      return rate;
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.classList.add('visible');
      document.getElementById('result').classList.remove('visible');
    }

    function clearError() {
      document.getElementById('error').classList.remove('visible');
    }

    async function convert() {
      clearError();
      const amountInput = document.getElementById('amount');
      const currency = document.getElementById('currency').value;
      const amount = parseFloat(amountInput.value);

      if (!amountInput.value || isNaN(amount) || amount <= 0) {
        showError('Please enter a valid amount greater than 0.');
        return;
      }

      const btn = document.getElementById('convertBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Calculating…';

      try {
        // Fetch mango price once per session
        if (mangoPrice === null) {
          mangoPrice = await fetchMangoPrice();
        }

        const rate = await fetchRate(currency);
        const inr = amount * rate;
        const kg = inr / mangoPrice;
        const mangoes = Math.floor(kg / 0.25);

        document.getElementById('resultKg').textContent = `${kg.toFixed(2)} kg`;
        document.getElementById('resultMangoes').textContent =
          `≈ ${mangoes.toLocaleString()} mango${mangoes !== 1 ? 'es' : ''} 🥭`;
        document.getElementById('resultDetail').textContent =
          `${amount.toLocaleString()} ${currency} → ₹${inr.toFixed(2)} ÷ ₹${mangoPrice.toFixed(2)}/kg`;
        document.getElementById('priceInfo').textContent =
          mangoPrice === FALLBACK_PRICE
            ? 'Using fallback mango price: ₹100/kg'
            : `Live mango price: ₹${mangoPrice.toFixed(2)}/kg (Agmarknet)`;

        document.getElementById('result').classList.add('visible');
      } catch (err) {
        showError(err.message || 'Something went wrong. Please try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Calculate 🥭';
      }
    }

    // Allow Enter key to trigger conversion
    document.getElementById('amount').addEventListener('keydown', e => {
      if (e.key === 'Enter') convert();
    });
  </script>
</body>
</html>
