<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🥭 Mango Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fff8e1 0%, #ffe082 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 40px;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header .emoji { font-size: 56px; display: block; margin-bottom: 8px; }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #3e2700;
    }

    h1 span { color: #f59e0b; }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #6b4f00;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    select, input[type="number"] {
      border: 2px solid #f0e0a0;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 1rem;
      color: #3e2700;
      background: #fffdf5;
      outline: none;
      transition: border-color 0.2s;
    }

    select:focus, input[type="number"]:focus {
      border-color: #f59e0b;
    }

    select { flex: 0 0 110px; cursor: pointer; }
    input[type="number"] { flex: 1; }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .price-display {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fffdf5;
      border: 2px solid #f0e0a0;
      border-radius: 12px;
      padding: 12px 14px;
    }

    .price-value {
      font-size: 1rem;
      font-weight: 700;
      color: #3e2700;
    }

    .price-label {
      font-size: 0.78rem;
      color: #16a34a;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #f59e0b, #f97316);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 6px;
    }

    button:hover { opacity: 0.92; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .result {
      margin-top: 28px;
      background: linear-gradient(135deg, #fff8e1, #fef3c7);
      border: 2px solid #fde68a;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      display: none;
    }

    .result.show { display: block; }

    .result .big {
      font-size: 2.8rem;
      font-weight: 800;
      color: #b45309;
      line-height: 1.1;
    }

    .result .unit {
      font-size: 1rem;
      color: #92400e;
      margin-top: 4px;
    }

    .result .detail {
      font-size: 0.82rem;
      color: #a07830;
      margin-top: 10px;
      line-height: 1.5;
    }

    .mango-strip {
      font-size: 1.6rem;
      margin-top: 10px;
      letter-spacing: 2px;
      line-height: 1.8;
      word-break: break-all;
    }

    .error {
      margin-top: 14px;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 10px;
      padding: 12px 16px;
      color: #b91c1c;
      font-size: 0.85rem;
      display: none;
    }

    .error.show { display: block; }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.75rem;
      color: #bbb;
    }

    .footer a { color: #f59e0b; text-decoration: none; }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <span class="emoji">🥭</span>
    <h1>How many <span>mangoes</span>?</h1>
    <p class="subtitle">Convert any currency to Indian market mangoes</p>
  </div>

  <div class="form-group">
    <label>Amount</label>
    <div class="input-row">
      <select id="currency">
        <option value="GBP">£ GBP</option>
        <option value="USD">$ USD</option>
        <option value="EUR">€ EUR</option>
        <option value="CHF">Fr CHF</option>
        <option value="AUD">A$ AUD</option>
        <option value="CAD">C$ CAD</option>
        <option value="JPY">¥ JPY</option>
        <option value="INR">₹ INR</option>
      </select>
      <input type="number" id="amount" placeholder="e.g. 100" min="0" step="any" />
    </div>
  </div>

  <div class="form-group">
    <label>Mango price (India, live)</label>
    <div class="price-display" id="priceDisplay">
      <span class="price-value" id="priceValue">fetching…</span>
      <span class="price-label" id="priceLabel"></span>
    </div>
  </div>

  <button id="convertBtn" onclick="convert()" disabled>Fetching mango price… 🥭</button>

  <div class="error" id="error"></div>

  <div class="result" id="result">
    <div class="big" id="resultKg"></div>
    <div class="unit">kg of mangoes</div>
    <div class="detail" id="resultDetail"></div>
    <div class="mango-strip" id="resultEmojis"></div>
  </div>

  <div class="footer">
    Mango prices via <a href="https://data.gov.in" target="_blank">data.gov.in</a> (Agmarknet) ·
    Exchange rates via <a href="https://open.er-api.com" target="_blank">ExchangeRate-API</a>
  </div>
</div>

<script>
  let mangoPrice = null;
  let mangoSource = '';

  async function fetchMangoPrice() {
    const FALLBACK = 100;
    try {
      // Agmarknet daily commodity prices — prices are in ₹/quintal (100 kg)
      const key = '579b464db66ec23bdd000001cdd3946e44ce4aab108d4753e6d8f3b6';
      const url = `https://api.data.gov.in/resource/9ef84268-d588-465a-a308-a864a43d0070` +
                  `?api-key=${key}&format=json&filters[commodity]=Mango&limit=100`;
      const res  = await fetch(url);
      const data = await res.json();

      if (data.records && data.records.length > 0) {
        const prices = data.records
          .map(r => parseFloat(r.modal_price))
          .filter(p => !isNaN(p) && p > 0);

        if (prices.length > 0) {
          const avg = prices.reduce((a, b) => a + b, 0) / prices.length;
          const perKg = Math.round(avg / 100); // quintal → kg
          return { price: perKg, source: `live · avg of ${prices.length} markets`, fallback: false };
        }
      }
    } catch (_) {}
    return { price: FALLBACK, source: 'estimated (API unavailable)', fallback: true };
  }

  async function init() {
    const result = await fetchMangoPrice();
    mangoPrice  = result.price;
    mangoSource = result.source;

    document.getElementById('priceValue').textContent = `₹${mangoPrice}/kg`;
    document.getElementById('priceLabel').textContent  = result.source;
    document.getElementById('priceLabel').style.color  = result.fallback ? '#f59e0b' : '#16a34a';

    const btn = document.getElementById('convertBtn');
    btn.disabled    = false;
    btn.textContent = 'Calculate 🥭';
  }

  async function convert() {
    if (!mangoPrice) return;

    const currency = document.getElementById('currency').value;
    const amount   = parseFloat(document.getElementById('amount').value);
    const btn      = document.getElementById('convertBtn');
    const result   = document.getElementById('result');
    const error    = document.getElementById('error');

    result.classList.remove('show');
    error.classList.remove('show');

    if (!amount || amount <= 0) {
      showError('Please enter a valid amount.');
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Fetching rates…';

    try {
      let inr;

      if (currency === 'INR') {
        inr = amount;
      } else {
        const res  = await fetch(`https://open.er-api.com/v6/latest/${currency}`);
        if (!res.ok) throw new Error('Rate fetch failed');
        const data = await res.json();
        if (!data.rates?.INR) throw new Error('INR rate not found');
        inr = amount * data.rates.INR;
      }

      const kg    = inr / mangoPrice;
      const units = Math.floor(kg / 0.25);
      const kgStr = kg >= 1000
        ? (kg / 1000).toFixed(2) + ' tonnes'
        : kg.toFixed(2);

      const symMap = { GBP:'£', USD:'$', EUR:'€', CHF:'Fr ', AUD:'A$', CAD:'C$', JPY:'¥', INR:'₹' };
      const sym = symMap[currency] || currency + ' ';

      document.getElementById('resultKg').textContent = kgStr;
      document.getElementById('resultDetail').innerHTML =
        `<b>${sym}${amount.toLocaleString()}</b> ≈ <b>₹${Math.round(inr).toLocaleString()}</b> ` +
        `at ₹${mangoPrice}/kg (${mangoSource})<br>` +
        `~${units.toLocaleString()} individual mangoes (~250g each)`;

      const display = Math.min(units, 50);
      document.getElementById('resultEmojis').textContent =
        '🥭'.repeat(display) + (units > 50 ? ` +${(units - 50).toLocaleString()} more` : '');

      result.classList.add('show');

    } catch (_) {
      showError('Could not fetch exchange rates. Check your connection and try again.');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Calculate 🥭';
    }
  }

  function showError(msg) {
    const el = document.getElementById('error');
    el.textContent = msg;
    el.classList.add('show');
  }

  document.getElementById('amount').addEventListener('keydown', e => {
    if (e.key === 'Enter') convert();
  });

  init();
</script>

</body>
</html>
