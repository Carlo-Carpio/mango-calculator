<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🥭 Mango Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fff8e1 0%, #ffe082 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 40px;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header .emoji { font-size: 56px; display: block; margin-bottom: 8px; }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #3e2700;
    }

    h1 span { color: #f59e0b; }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #6b4f00;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    select, input[type="number"] {
      border: 2px solid #f0e0a0;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 1rem;
      color: #3e2700;
      background: #fffdf5;
      outline: none;
      transition: border-color 0.2s;
    }

    select:focus, input[type="number"]:focus {
      border-color: #f59e0b;
    }

    select { flex: 0 0 110px; cursor: pointer; }
    input[type="number"] { flex: 1; }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .price-display {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fffdf5;
      border: 2px solid #f0e0a0;
      border-radius: 12px;
      padding: 12px 14px;
    }

    .price-value {
      font-size: 1rem;
      font-weight: 700;
      color: #3e2700;
    }

    .price-label {
      font-size: 0.78rem;
      color: #16a34a;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #f59e0b, #f97316);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 6px;
    }

    button:hover { opacity: 0.92; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .result {
      margin-top: 28px;
      background: linear-gradient(135deg, #fff8e1, #fef3c7);
      border: 2px solid #fde68a;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      display: none;
    }

    .result.show { display: block; }

    .result .big {
      font-size: 2.8rem;
      font-weight: 800;
      color: #b45309;
      line-height: 1.1;
    }

    .result .unit {
      font-size: 1rem;
      color: #92400e;
      margin-top: 4px;
    }

    .result .detail {
      font-size: 0.82rem;
      color: #a07830;
      margin-top: 10px;
      line-height: 1.5;
    }

    .mango-strip {
      font-size: 1.6rem;
      margin-top: 10px;
      letter-spacing: 2px;
      line-height: 1.8;
      word-break: break-all;
    }

    .error {
      margin-top: 14px;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 10px;
      padding: 12px 16px;
      color: #b91c1c;
      font-size: 0.85rem;
      display: none;
    }

    .error.show { display: block; }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.75rem;
      color: #bbb;
    }

    .footer a { color: #f59e0b; text-decoration: none; }

    .divider {
      border: none;
      border-top: 2px dashed #f0e0a0;
      margin: 28px 0 24px;
    }

    .section-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: #6b4f00;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }

    .items-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .item-card {
      background: #fffdf5;
      border: 2px solid #f0e0a0;
      border-radius: 14px;
      padding: 14px 12px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.1s, box-shadow 0.2s;
      text-align: left;
    }

    .item-card:hover {
      border-color: #f59e0b;
      box-shadow: 0 4px 14px rgba(245,158,11,0.15);
      transform: translateY(-1px);
    }

    .item-card.active {
      border-color: #f97316;
      background: linear-gradient(135deg, #fff8e1, #fef3c7);
    }

    .item-emoji { font-size: 1.6rem; display: block; margin-bottom: 4px; }

    .item-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: #3e2700;
      line-height: 1.3;
    }

    .item-price {
      font-size: 0.72rem;
      color: #aaa;
      margin-top: 2px;
    }

    .item-mangoes {
      margin-top: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      color: #b45309;
      min-height: 1.2em;
    }

    .item-mangoes.loading { color: #ccc; font-weight: 400; }

    .items-details { margin-bottom: 4px; }

    .items-details > summary {
      list-style: none;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0;
      padding: 6px 0;
    }

    .items-details > summary::-webkit-details-marker { display: none; }

    .chevron {
      font-size: 0.9rem;
      color: #b8975a;
      transition: transform 0.2s;
      display: inline-block;
    }

    .items-details[open] .chevron { transform: rotate(180deg); }

    .items-details[open] > summary { margin-bottom: 14px; }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <span class="emoji">🥭</span>
    <h1>How many <span>mangoes</span>?</h1>
    <p class="subtitle">Convert any currency to Indian market mangoes</p>
  </div>

  <div class="form-group">
    <label>Amount</label>
    <div class="input-row">
      <select id="currency">
        <option value="GBP">£ GBP</option>
        <option value="USD">$ USD</option>
        <option value="EUR">€ EUR</option>
        <option value="CHF">Fr CHF</option>
        <option value="AUD">A$ AUD</option>
        <option value="CAD">C$ CAD</option>
        <option value="JPY">¥ JPY</option>
        <option value="INR">₹ INR</option>
      </select>
      <input type="number" id="amount" placeholder="e.g. 100" min="0" step="any" />
    </div>
  </div>

  <div class="form-group">
    <label>Mango price (India, live)</label>
    <div class="price-display" id="priceDisplay">
      <span class="price-value" id="priceValue">fetching…</span>
      <span class="price-label" id="priceLabel"></span>
    </div>
  </div>

  <button id="convertBtn" onclick="convert()" disabled>Fetching mango price… 🥭</button>

  <div class="error" id="error"></div>

  <div class="result" id="result">
    <div class="big" id="resultKg"></div>
    <div class="unit">kg of mangoes</div>
    <div class="detail" id="resultDetail"></div>
    <div class="mango-strip" id="resultEmojis"></div>
  </div>

  <hr class="divider" />

  <details class="items-details">
    <summary class="section-title">🏷️ How many mangoes to buy…? <span class="chevron">▾</span></summary>
    <div class="items-grid" id="itemsGrid"></div>
  </details>

  <div class="footer">
    Mango prices via <a href="https://data.gov.in" target="_blank">data.gov.in</a> (Agmarknet) ·
    Exchange rates via <a href="https://open.er-api.com" target="_blank">ExchangeRate-API</a>
  </div>
</div>

<script>
  const ITEMS = [
    { emoji: '🏎️', name: 'Ferrari SF90 Stradale', priceUSD: 530000 },
    { emoji: '🏠', name: 'Avg. house in Milan',   priceUSD: 540000 },
    { emoji: '📱', name: 'iPhone 16 Pro Max',      priceUSD: 1199   },
    { emoji: '💍', name: 'Diamond ring (1 ct)',    priceUSD: 10000  },
    { emoji: '✈️', name: 'Business Rome → Tokyo',  priceUSD: 4000   },
    { emoji: '🎸', name: 'Gibson Les Paul',         priceUSD: 2499   },
    { emoji: '🍔', name: 'Big Mac',                 priceUSD: 5.58  },
    { emoji: '☕', name: 'Espresso in Rome',        priceUSD: 1.50  },
  ];

  let mangoPrice = null;
  let mangoSource = '';
  let usdToInr    = null;

  async function fetchMangoPrice() {
    const FALLBACK = 100;
    try {
      // Agmarknet daily commodity prices — prices are in ₹/quintal (100 kg)
      const key = '579b464db66ec23bdd000001cdd3946e44ce4aab108d4753e6d8f3b6';
      const url = `https://api.data.gov.in/resource/9ef84268-d588-465a-a308-a864a43d0070` +
                  `?api-key=${key}&format=json&filters[commodity]=Mango&limit=100`;
      const res  = await fetch(url);
      const data = await res.json();

      if (data.records && data.records.length > 0) {
        const prices = data.records
          .map(r => parseFloat(r.modal_price))
          .filter(p => !isNaN(p) && p > 0);

        if (prices.length > 0) {
          const avg = prices.reduce((a, b) => a + b, 0) / prices.length;
          const perKg = Math.round(avg / 100); // quintal → kg
          return { price: perKg, source: `live · avg of ${prices.length} markets`, fallback: false };
        }
      }
    } catch (_) {}
    return { price: FALLBACK, source: 'estimated (API unavailable)', fallback: true };
  }

  function renderItems(rate) {
    const grid = document.getElementById('itemsGrid');
    grid.innerHTML = '';
    ITEMS.forEach((item, i) => {
      const card = document.createElement('div');
      card.className = 'item-card';
      card.dataset.index = i;

      const mangoes = rate && mangoPrice
        ? Math.floor((item.priceUSD * rate / mangoPrice) / 0.25)
        : null;
      const mangoText = mangoes !== null
        ? `🥭 ${mangoes.toLocaleString()} mangoes`
        : '<span class="loading">calculating…</span>';

      card.innerHTML = `
        <span class="item-emoji">${item.emoji}</span>
        <div class="item-name">${item.name}</div>
        <div class="item-price">$${item.priceUSD.toLocaleString()}</div>
        <div class="item-mangoes">${mangoText}</div>
      `;

      card.addEventListener('click', () => {
        document.querySelectorAll('.item-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        document.getElementById('amount').value = item.priceUSD;
        document.getElementById('currency').value = 'USD';
        convert();
        document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      });

      grid.appendChild(card);
    });
  }

  async function init() {
    renderItems(null); // show cards immediately with "calculating…"

    const [mangoResult, rateRes] = await Promise.all([
      fetchMangoPrice(),
      fetch('https://open.er-api.com/v6/latest/USD').then(r => r.json()).catch(() => null),
    ]);

    mangoPrice  = mangoResult.price;
    mangoSource = mangoResult.source;
    usdToInr    = rateRes?.rates?.INR ?? null;

    document.getElementById('priceValue').textContent = `₹${mangoPrice}/kg`;
    document.getElementById('priceLabel').textContent  = mangoResult.source;
    document.getElementById('priceLabel').style.color  = mangoResult.fallback ? '#f59e0b' : '#16a34a';

    const btn = document.getElementById('convertBtn');
    btn.disabled    = false;
    btn.textContent = 'Calculate 🥭';

    renderItems(usdToInr);
  }

  async function convert() {
    if (!mangoPrice) return;

    const currency = document.getElementById('currency').value;
    const amount   = parseFloat(document.getElementById('amount').value);
    const btn      = document.getElementById('convertBtn');
    const result   = document.getElementById('result');
    const error    = document.getElementById('error');

    result.classList.remove('show');
    error.classList.remove('show');

    if (!amount || amount <= 0) {
      showError('Please enter a valid amount.');
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Fetching rates…';

    try {
      let inr;

      if (currency === 'INR') {
        inr = amount;
      } else {
        const res  = await fetch(`https://open.er-api.com/v6/latest/${currency}`);
        if (!res.ok) throw new Error('Rate fetch failed');
        const data = await res.json();
        if (!data.rates?.INR) throw new Error('INR rate not found');
        inr = amount * data.rates.INR;
      }

      const kg    = inr / mangoPrice;
      const units = Math.floor(kg / 0.25);
      const kgStr = kg >= 1000
        ? (kg / 1000).toFixed(2) + ' tonnes'
        : kg.toFixed(2);

      const symMap = { GBP:'£', USD:'$', EUR:'€', CHF:'Fr ', AUD:'A$', CAD:'C$', JPY:'¥', INR:'₹' };
      const sym = symMap[currency] || currency + ' ';

      document.getElementById('resultKg').textContent = kgStr;
      document.getElementById('resultDetail').innerHTML =
        `<b>${sym}${amount.toLocaleString()}</b> ≈ <b>₹${Math.round(inr).toLocaleString()}</b> ` +
        `at ₹${mangoPrice}/kg (${mangoSource})<br>` +
        `~${units.toLocaleString()} individual mangoes (~250g each)`;

      const display = Math.min(units, 50);
      document.getElementById('resultEmojis').textContent =
        '🥭'.repeat(display) + (units > 50 ? ` +${(units - 50).toLocaleString()} more` : '');

      result.classList.add('show');

    } catch (_) {
      showError('Could not fetch exchange rates. Check your connection and try again.');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Calculate 🥭';
    }
  }

  function showError(msg) {
    const el = document.getElementById('error');
    el.textContent = msg;
    el.classList.add('show');
  }

  document.getElementById('amount').addEventListener('keydown', e => {
    if (e.key === 'Enter') convert();
  });

  init();
</script>

</body>
</html>
